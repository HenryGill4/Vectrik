name: Deploy to Azure Dev

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_WEBAPP_NAME: opcentrix-dev

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Opcentrix-V3.csproj

      - name: Build
        run: dotnet build Opcentrix-V3.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Opcentrix-V3.Tests/Opcentrix-V3.Tests.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Opcentrix-V3.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
