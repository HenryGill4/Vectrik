name: Deploy to Azure Dev

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_WEBAPP_NAME: vectrik-dev
  AZURE_RESOURCE_GROUP: vectrik-dev-rg

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Vectrik.csproj

      - name: Build
        run: dotnet build Vectrik.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Vectrik.Tests/Vectrik.Tests.csproj --configuration Release --no-restore

      - name: Publish (self-contained for .NET 10)
        run: dotnet publish Vectrik.csproj --configuration Release --runtime win-x64 --self-contained --output ./publish

      - name: Create deployment package
        run: Compress-Archive -Path './publish/*' -DestinationPath './deploy.zip' -Force

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: az webapp deploy --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --src-path ./deploy.zip --type zip --clean true --restart true
