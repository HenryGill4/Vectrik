<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <defs>
    <!-- Accent gradient — electric blue to cyan -->
    <linearGradient id="vAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Subtle metallic for structure -->
    <linearGradient id="vMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="vShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3B82F6" flood-opacity="0.2"/>
    </filter>
    <filter id="vGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3B82F6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- V mark — geometric, angular, precision-cut -->
  <g transform="translate(200, 40)" filter="url(#vShadow)">
    <!-- Outer V shape — bold geometric -->
    <polygon points="0,200 -90,0 -55,0 0,165 55,0 90,0"
             fill="url(#vAccent)"/>
    <!-- Inner precision line — lighter, creates depth -->
    <polygon points="0,170 -65,8 -50,8 0,140 50,8 65,8"
             fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Measurement tick marks on left arm -->
    <line x1="-78" y1="25" x2="-68" y2="25" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="-72" y1="50" x2="-64" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="-66" y1="75" x2="-58" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="-60" y1="100" x2="-52" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- Measurement tick marks on right arm -->
    <line x1="78" y1="25" x2="68" y2="25" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="72" y1="50" x2="64" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="66" y1="75" x2="58" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="60" y1="100" x2="52" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- Small crosshair dot at apex -->
    <circle cx="0" cy="195" r="3" fill="#22D3EE" opacity="0.8"/>
    <circle cx="0" cy="195" r="6" fill="none" stroke="#22D3EE" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- VECTRIK wordmark -->
  <text x="200" y="310" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="48" font-weight="800" letter-spacing="10"
        fill="#f1f5f9">VECTRIK</text>

  <!-- Tagline -->
  <text x="200" y="345" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="400" letter-spacing="8"
        fill="#64748b">MANUFACTURING INTELLIGENCE</text>

  <!-- Thin accent line separator -->
  <line x1="140" y1="358" x2="260" y2="358" stroke="url(#vAccent)" stroke-width="1" opacity="0.4"/>
</svg>