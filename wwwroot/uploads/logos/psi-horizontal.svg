<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" fill="none">
  <defs>
    <linearGradient id="hShieldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="30%" stop-color="#fafafa"/>
      <stop offset="50%" stop-color="#a1a1aa"/>
      <stop offset="70%" stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#71717a"/>
    </linearGradient>
    <linearGradient id="hShieldFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
  </defs>

  <!-- Mini shield -->
  <g transform="translate(55, 10)">
    <!-- Shield outer -->
    <path d="M0 -2 L38 12 C39.5 12.5 40.5 14 40.5 15.5 L40.5 42 C40.5 58 32 72 0 84 C-32 72 -40.5 58 -40.5 42 L-40.5 15.5 C-40.5 14 -39.5 12.5 -38 12 Z"
          fill="url(#hShieldEdge)"/>
    <!-- Shield inner -->
    <path d="M0 4 L34 16 C35 16.5 35.5 17.5 35.5 18.5 L35.5 41 C35.5 54 28 66 0 76 C-28 66 -35.5 54 -35.5 41 L-35.5 18.5 C-35.5 17.5 -35 16.5 -34 16 Z"
          fill="url(#hShieldFill)"/>
    <!-- Inner border -->
    <path d="M0 10 L30 20 C30.5 20.2 31 21 31 21.5 L31 40 C31 51 25 60 0 69 C-25 60 -31 51 -31 40 L-31 21.5 C-31 21 -30.5 20.2 -30 20 Z"
          fill="none" stroke="#52525b" stroke-width="0.6"/>
    <!-- Crown mini -->
    <g transform="translate(0, 8)" fill="#d4d4d8">
      <rect x="-8" y="1" width="16" height="1.5" rx="0.75"/>
      <polygon points="-7,-3.5 -5.5,0 -2.5,-5 0,0 2.5,-5 5.5,0 7,-3.5 7,1 -7,1"/>
      <circle cx="-2.5" cy="-2.5" r="0.8" fill="#fafafa"/>
      <circle cx="0" cy="-3.5" r="0.8" fill="#fafafa"/>
      <circle cx="2.5" cy="-2.5" r="0.8" fill="#fafafa"/>
    </g>
    <!-- PS text -->
    <text x="0" y="52" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="32" font-weight="800" letter-spacing="1"
          fill="#fafafa">PS</text>
  </g>

  <!-- Company text -->
  <text x="130" y="52" text-anchor="start"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="700" letter-spacing="6"
        fill="#fafafa">POLITE SOCIETY</text>
  <text x="132" y="80" text-anchor="start"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="400" letter-spacing="10"
        fill="#71717a">INDUSTRIES</text>
</svg>