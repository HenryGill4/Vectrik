<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <defs>
    <!-- Metallic gradient for shield border -->
    <linearGradient id="shieldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="30%" stop-color="#fafafa"/>
      <stop offset="50%" stop-color="#a1a1aa"/>
      <stop offset="70%" stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#71717a"/>
    </linearGradient>
    <!-- Darker inner fill -->
    <linearGradient id="shieldFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <!-- Subtle inner shadow -->
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
    <!-- Drop shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Shield outer shape (metallic border) -->
  <path d="M200 30 L340 80 C345 82 348 87 348 92 L348 220 C348 290 310 350 200 400 C90 350 52 290 52 220 L52 92 C52 87 55 82 60 80 Z"
        fill="url(#shieldEdge)" filter="url(#dropShadow)"/>

  <!-- Shield inner (dark fill) -->
  <path d="M200 48 L326 92 C328 93 330 95 330 98 L330 218 C330 280 296 332 200 378 C104 332 70 280 70 218 L70 98 C70 95 72 93 74 92 Z"
        fill="url(#shieldFill)"/>

  <!-- Fine inner border line -->
  <path d="M200 62 L314 100 C315 101 316 102 316 104 L316 216 C316 270 286 316 200 358 C114 316 84 270 84 216 L84 104 C84 102 85 101 86 100 Z"
        fill="none" stroke="#52525b" stroke-width="1"/>

  <!-- Crown element at top -->
  <g transform="translate(200, 58)" fill="#d4d4d8">
    <!-- Crown base -->
    <rect x="-18" y="2" width="36" height="3" rx="1.5"/>
    <!-- Crown points -->
    <polygon points="-16,-8 -12,0 -6,-12 0,0 6,-12 12,0 16,-8 16,2 -16,2"/>
    <!-- Crown gems (3 dots) -->
    <circle cx="-6" cy="-6" r="1.5" fill="#fafafa"/>
    <circle cx="0" cy="-8" r="1.5" fill="#fafafa"/>
    <circle cx="6" cy="-6" r="1.5" fill="#fafafa"/>
  </g>

  <!-- "POLITE SOCIETY" curved text above monogram -->
  <text x="200" y="130" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="500" letter-spacing="6"
        fill="#a1a1aa">POLITE SOCIETY</text>

  <!-- PS Monogram — large, bold -->
  <text x="200" y="270" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="140" font-weight="800" letter-spacing="4"
        fill="#fafafa">PS</text>

  <!-- "IND" small label below monogram -->
  <g transform="translate(200, 310)">
    <rect x="-24" y="-14" width="48" height="22" rx="2"
          fill="none" stroke="#71717a" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="13" font-weight="600" letter-spacing="5"
          fill="#a1a1aa">IND</text>
  </g>

  <!-- Company name below shield -->
  <text x="200" y="440" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="32" font-weight="700" letter-spacing="8"
        fill="#fafafa">POLITE SOCIETY</text>
  <text x="200" y="470" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="400" letter-spacing="12"
        fill="#71717a">INDUSTRIES</text>
</svg>