<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" fill="none">
  <defs>
    <linearGradient id="hAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- V icon mark — compact -->
  <g transform="translate(35, 5)">
    <polygon points="0,65 -28,0 -17,0 0,53 17,0 28,0"
             fill="url(#hAccent)"/>
    <!-- Tick marks -->
    <line x1="-24" y1="8" x2="-20" y2="8" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="-20" y1="24" x2="-16" y2="24" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="24" y1="8" x2="20" y2="8" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="20" y1="24" x2="16" y2="24" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Apex dot -->
    <circle cx="0" cy="62" r="1.5" fill="#22D3EE" opacity="0.8"/>
  </g>

  <!-- VECTRIK text -->
  <text x="90" y="50" text-anchor="start"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="36" font-weight="800" letter-spacing="8"
        fill="#f1f5f9">VECTRIK</text>

  <!-- Subtle tagline -->
  <text x="92" y="68" text-anchor="start"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="9" font-weight="400" letter-spacing="5"
        fill="#64748b">MANUFACTURING INTELLIGENCE</text>
</svg>