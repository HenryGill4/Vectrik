<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="lAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="lShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(59,130,246,0)"/>
      <stop offset="50%" stop-color="rgba(59,130,246,0.15)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0)"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0;2 0" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <style>
    /* V outline draws in from both arms simultaneously */
    .v-outline {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawV 1.2s ease-out 0.3s forwards;
    }
    @keyframes drawV {
      to { stroke-dashoffset: 0; }
    }

    /* V fill fades in after outline */
    .v-fill {
      opacity: 0;
      animation: fadeIn 0.5s ease-out 1.0s forwards;
    }

    /* Tick marks appear sequentially */
    .tick-1 { opacity: 0; animation: tickIn 0.2s ease-out 1.3s forwards; }
    .tick-2 { opacity: 0; animation: tickIn 0.2s ease-out 1.4s forwards; }
    .tick-3 { opacity: 0; animation: tickIn 0.2s ease-out 1.5s forwards; }
    .tick-4 { opacity: 0; animation: tickIn 0.2s ease-out 1.6s forwards; }
    .tick-5 { opacity: 0; animation: tickIn 0.2s ease-out 1.3s forwards; }
    .tick-6 { opacity: 0; animation: tickIn 0.2s ease-out 1.4s forwards; }
    .tick-7 { opacity: 0; animation: tickIn 0.2s ease-out 1.5s forwards; }
    .tick-8 { opacity: 0; animation: tickIn 0.2s ease-out 1.6s forwards; }
    @keyframes tickIn {
      from { opacity: 0; transform: scaleX(0); }
      to { opacity: 1; transform: scaleX(1); }
    }

    /* Apex dot pulses in */
    .apex-dot {
      opacity: 0;
      animation: pulseIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 1.7s forwards;
    }
    .apex-ring {
      opacity: 0;
      animation: ringExpand 0.6s ease-out 1.8s forwards;
    }
    @keyframes pulseIn {
      from { opacity: 0; transform: scale(0); }
      to { opacity: 0.9; transform: scale(1); }
    }
    @keyframes ringExpand {
      from { opacity: 0.6; r: 3; }
      to { opacity: 0; r: 20; }
    }

    /* Wordmark slides up */
    .wordmark {
      opacity: 0;
      animation: slideUp 0.6s ease-out 2.0s forwards;
    }
    .tagline {
      opacity: 0;
      animation: slideUp 0.5s ease-out 2.2s forwards;
    }
    .accent-line {
      opacity: 0;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: drawLine 0.6s ease-out 2.4s forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawLine {
      to { opacity: 0.4; stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Shimmer after load */
    .shimmer {
      opacity: 0;
      animation: fadeIn 0.3s ease-out 2.6s forwards;
    }

    /* Subtle glow pulse on completed V */
    .v-group {
      animation: glowPulse 3s ease-in-out 3s infinite;
    }
    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 0px rgba(59, 130, 246, 0)); }
      50% { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.2)); }
    }
  </style>

  <g class="v-group">
    <!-- V outline (draws in) -->
    <g transform="translate(200, 30)">
      <polygon class="v-outline"
               points="0,210 -95,0 -58,0 0,172 58,0 95,0"
               fill="none" stroke="url(#lAccent)" stroke-width="2" stroke-linejoin="round"/>

      <!-- V fill (fades in) -->
      <polygon class="v-fill"
               points="0,210 -95,0 -58,0 0,172 58,0 95,0"
               fill="url(#lAccent)"/>

      <!-- Tick marks left arm -->
      <line class="tick-1" x1="-82" y1="26" x2="-72" y2="26" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <line class="tick-2" x1="-76" y1="52" x2="-68" y2="52" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line class="tick-3" x1="-70" y1="78" x2="-62" y2="78" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <line class="tick-4" x1="-64" y1="104" x2="-56" y2="104" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

      <!-- Tick marks right arm -->
      <line class="tick-5" x1="82" y1="26" x2="72" y2="26" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <line class="tick-6" x1="76" y1="52" x2="68" y2="52" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line class="tick-7" x1="70" y1="78" x2="62" y2="78" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <line class="tick-8" x1="64" y1="104" x2="56" y2="104" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

      <!-- Apex crosshair dot -->
      <circle class="apex-dot" cx="0" cy="205" r="3.5" fill="#22D3EE"/>
      <circle class="apex-ring" cx="0" cy="205" r="3" fill="none" stroke="#22D3EE" stroke-width="1"/>

      <!-- Shimmer overlay -->
      <polygon class="shimmer"
               points="0,210 -95,0 -58,0 0,172 58,0 95,0"
               fill="url(#lShimmer)"/>
    </g>
  </g>

  <!-- VECTRIK wordmark -->
  <text class="wordmark" x="200" y="310" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="44" font-weight="800" letter-spacing="10"
        fill="#f1f5f9">VECTRIK</text>

  <!-- Tagline -->
  <text class="tagline" x="200" y="342" text-anchor="middle"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="12" font-weight="400" letter-spacing="7"
        fill="#64748b">MANUFACTURING INTELLIGENCE</text>

  <!-- Accent line -->
  <line class="accent-line" x1="140" y1="355" x2="260" y2="355"
        stroke="url(#lAccent)" stroke-width="1"/>
</svg>