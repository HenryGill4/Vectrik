<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <linearGradient id="sEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="30%" stop-color="#fafafa"/>
      <stop offset="50%" stop-color="#a1a1aa"/>
      <stop offset="70%" stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#71717a"/>
    </linearGradient>
    <linearGradient id="sFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <filter id="sShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g transform="translate(60, 12)" filter="url(#sShadow)">
    <!-- Shield outer -->
    <path d="M0 0 L48 16 C49.5 16.5 51 18.5 51 20 L51 56 C51 78 40 94 0 110 C-40 94 -51 78 -51 56 L-51 20 C-51 18.5 -49.5 16.5 -48 16 Z"
          fill="url(#sEdge)"/>
    <!-- Shield inner -->
    <path d="M0 7 L43 20 C44 20.5 45 22 45 23 L45 54 C45 72 36 86 0 100 C-36 86 -45 72 -45 54 L-45 23 C-45 22 -44 20.5 -43 20 Z"
          fill="url(#sFill)"/>
    <!-- Inner border -->
    <path d="M0 14 L38 25 C38.5 25.2 39 26 39 27 L39 52 C39 68 31 79 0 92 C-31 79 -39 68 -39 52 L-39 27 C-39 26 -38.5 25.2 -38 25 Z"
          fill="none" stroke="#52525b" stroke-width="0.7"/>

    <!-- Crown -->
    <g transform="translate(0, 12)" fill="#d4d4d8">
      <rect x="-10" y="2" width="20" height="2" rx="1"/>
      <polygon points="-9,-4 -7,1 -3,-7 0,1 3,-7 7,1 9,-4 9,2 -9,2"/>
      <circle cx="-3" cy="-3" r="1" fill="#fafafa"/>
      <circle cx="0" cy="-5" r="1" fill="#fafafa"/>
      <circle cx="3" cy="-3" r="1" fill="#fafafa"/>
    </g>

    <!-- POLITE SOCIETY small text -->
    <text x="0" y="40" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="7.5" font-weight="500" letter-spacing="2.5"
          fill="#a1a1aa">POLITE SOCIETY</text>

    <!-- PS -->
    <text x="0" y="72" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="42" font-weight="800" letter-spacing="2"
          fill="#fafafa">PS</text>

    <!-- IND label -->
    <g transform="translate(0, 84)">
      <rect x="-12" y="-8" width="24" height="12" rx="1.5"
            fill="none" stroke="#71717a" stroke-width="0.6"/>
      <text x="0" y="0" text-anchor="middle"
            font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
            font-size="7" font-weight="600" letter-spacing="3"
            fill="#a1a1aa">IND</text>
    </g>
  </g>
</svg>